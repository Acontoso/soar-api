openapi: 3.0.3
info:
  title: SOAR API
  version: 1.0.0
  description: |
    The SOAR API provides enrichment and response automation for security operations. It enables threat intelligence lookups, automated blocking actions, and utility endpoints for health monitoring. All endpoints require JWT authentication.

servers:
  - url: https://m86hizeep0.execute-api.ap-southeast-2.amazonaws.com/core/

tags:
  - name: Enrichment
    description: Endpoints for threat intelligence and IOC enrichment.
  - name: Action
    description: Endpoints for automated response and blocking actions.
  - name: Utility
    description: Utility endpoints for health checks and diagnostics.

paths:
  # --- Enrichment Endpoints ---
  /ipabusedb:
    get:
      tags: [Enrichment]
      summary: Lookup IP in AbuseIPDB
      description: |
        Checks the specified IP address against AbuseIPDB for reputation, report count, and Tor status.
      operationId: getAbuseIpdb
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: ip
          schema:
            type: string
          required: true
          description: IP address to check (IPv4 or IPv6)
      responses:
        '200':
          description: AbuseIPDB lookup result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AbuseIPDBResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/UpstreamError'

  /anomali:
    get:
      tags: [Enrichment]
      summary: Lookup IOC in Anomali ThreatStream
      description: |
        Looks up an Indicator of Compromise (IOC) in Anomali ThreatStream and returns confidence and type information.
      operationId: getAnomali
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: ioc
          schema:
            type: string
          required: true
          description: Indicator of Compromise (IOC) to check (IP, domain, or hash)
      responses:
        '200':
          description: Anomali lookup result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnomaliResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/UpstreamError'

  # --- Action Endpoints ---
  /datp/upload:
    post:
      tags: [Action]
      summary: Upload IOC to Microsoft Defender (DATP)
      description: |
        Uploads an IOC to Microsoft Defender Threat Protection (DATP) for automated blocking or auditing.
      operationId: postDatpUpload
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DatpUploadRequest'
      responses:
        '200':
          description: DATP upload result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatpUploadResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/UpstreamError'

  /azuread/blockip:
    post:
      tags: [Action]
      summary: Block IP in Azure AD Named Location
      description: |
        Blocks the specified IP address in an Azure AD Named Location list for conditional access policies.
      operationId: postAzureAdBlockIp
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AzureAdBlockIpRequest'
      responses:
        '200':
          description: Azure AD block result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AzureAdBlockIpResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/UpstreamError'

  /sase/block:
    post:
      tags: [Action]
      summary: Block IOC in SASE (Umbrella)
      description: |
        Blocks an IOC (IP, domain, or URL) in Cisco Umbrella SASE for network-wide enforcement.
      operationId: postSaseBlock
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SaseBlockRequest'
      responses:
        '200':
          description: SASE block result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SaseBlockResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/UpstreamError'

  # --- Utility Endpoints ---
  /:
    get:
      tags: [Utility]
      summary: Health check
      description: |
        Returns a simple health check message to verify the API is running and authenticated.
      operationId: getHealth
      security:
        - bearerAuth: []
      responses:
        '200':
          description: API is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '500':
          $ref: '#/components/responses/UpstreamError'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Enter your OAuth 2.0 Bearer token in the format: `Bearer <access_token>`.
        This API requires a valid OAuth 2.0 access token for all endpoints.

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    UpstreamError:
      description: Upstream API issue or internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    HealthResponse:
      type: object
      description: Health check response
      properties:
        message:
          type: string
          description: Health check message

    AbuseIPDBResponse:
      type: object
      description: AbuseIPDB lookup result
      properties:
        Confidence:
          type: integer
          description: Abuse confidence score (0-100)
        Country:
          type: string
          description: Country name of the IP
        ReportCount:
          type: integer
          description: Number of abuse reports
        Tor:
          type: boolean
          description: Whether the IP is a Tor exit node
        IOC:
          type: string
          description: The IP address queried
        Private:
          type: boolean
          description: Whether the IP is private

    AnomaliResponse:
      type: object
      description: Anomali lookup result
      properties:
        Confidence:
          type: integer
          description: Average confidence score (0-100)
        IOCType:
          type: string
          description: Type of Indicator of Compromise (e.g., IP, domain, hash)
        IOC:
          type: string
          description: The IOC queried
        Grade:
          type: string
          description: Confidence grade (Low, Medium, High)

    DatpUploadRequest:
      type: object
      description: Request to upload an IOC to Microsoft Defender (DATP)
      properties:
        ioc:
          type: string
          description: Indicator of Compromise (IP, domain, or hash)
        action:
          type: string
          enum: [Block, Audit, BlockAndRemediate]
          description: Action to take in DATP
        incident_id:
          type: string
          description: Incident ID for tracking
      required: [ioc, action, incident_id]

    DatpUploadResponse:
      type: object
      description: DATP upload result
      properties:
        Added:
          type: boolean
          description: Whether the IOC was added to DATP
        IOC:
          type: string
          description: Indicator of Compromise
        Platform:
          type: string
          description: Platform name (e.g., DATP)
        Action:
          type: string
          description: Action taken (e.g., Block, None)

    AzureAdBlockIpRequest:
      type: object
      description: Request to block an IP in Azure AD Named Location
      properties:
        ioc:
          type: string
          description: IP to block
        list_id:
          type: string
          description: Named location list ID
        list_name:
          type: string
          description: Named location list name
        incident_id:
          type: string
          description: Incident ID for tracking
      required: [ioc, list_id, list_name, incident_id]

    AzureAdBlockIpResponse:
      type: object
      description: Azure AD block result
      properties:
        Action:
          type: boolean
          description: Whether the block action was successful
        IOC:
          type: string
          description: The IP address (IOC) attempted to block
        ListName:
          type: string
          description: The Azure AD Named Location list name

    SaseBlockRequest:
      type: object
      description: Request to block an IOC in SASE (Umbrella)
      properties:
        ioc:
          type: string
          description: Indicator of Compromise (IP, domain, or URL)
        incident_id:
          type: string
          description: Incident ID for tracking
      required: [ioc, incident_id]

    SaseBlockResponse:
      type: object
      description: SASE block result
      properties:
        Added:
          type: boolean
          description: Whether the IOC was added to SASE
        IOC:
          type: string
          description: Indicator of Compromise
        Platform:
          type: string
          description: Platform name (e.g., SASE)
        Action:
          type: string
          description: Action taken (e.g., Block)

    ErrorResponse:
      type: object
      description: Error response schema
      properties:
        error:
          type: string
          description: Error message
        details:
          type: string
          description: Additional error details

security:
  - bearerAuth: []
